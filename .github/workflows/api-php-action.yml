name: Build and Publish API PHP SDK (GIT)

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        required: false
        default: false
        description: "Publish the package, default is false"

jobs:
  build_and_publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
      - name: Install NPM dependencies
        run: npm ci
      - name: Generate SDK
        id: generate-sdk
        run: ./api-php/build-sdk.sh
        shell: bash
      - name: Build sample
        run: ./api-php/build-samples.sh
        shell: bash
      - name: Publish SDK
        if: inputs.publish == true
        run: ./api-php/publish-sdk.sh
        shell: bash
        env:
          MEWMBA_GIT_PUBLISH_TOKEN: ${{ secrets.MEWMBA_GIT_PUBLISH_TOKEN }}
          PACKAGE_VERSION: ${{ steps.generate-sdk.outputs.trinsic-package-version }}
          SDK_REPOSITORY_PATH: ${{ github.repository }}
